# Elk OS — RAG overlay, prod (ELK_OS_TARGET=box)
# Internal-only: the KB databases (Postgres/Qdrant/Redis) are NEVER published to
# the host. Only the RAG API is reachable, and only on loopback
# (127.0.0.1:${RAG_API_PORT:-19100}), so the host-side Claude/MCP can query it
# while the box stays closed to the public internet (Caddy fronts Directus; it
# does not proxy the RAG API). The portal consumes the RAG API over the internal
# elkos-rag network via compose.portal.rag.yaml (ELK_OS_WITH_INTELLIGENCE,
# default true, layers it in); set ELK_OS_WITH_INTELLIGENCE=false for the old
# Directus-full-text-only KB search.

services:
  elkos-rag-postgres:
    expose:
      - "5432"

  elkos-qdrant:
    expose:
      - "6333"

  elkos-redis:
    expose:
      - "6379"

  elkos-rag-api:
    expose:
      - "9100"
    ports:
      # Fallback matches the isolated .env.example default (19100), never the
      # host-engine port 9100 the isolation exists to avoid (commit 5222976).
      - "127.0.0.1:${RAG_API_PORT:-19100}:9100"
