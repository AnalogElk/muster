# Elk OS — RAG knowledge-engine overlay (P3)
#
# ADDITIVE. This file never touches the core Postgres/Directus services in
# compose.yaml — it adds the local RAG stack as a self-contained, namespaced
# overlay:
#
#   elkos-rag-postgres   Postgres 15 — KB documents + full-text search
#   elkos-qdrant         Qdrant       — vector embeddings (384-dim, local model)
#   elkos-redis          Redis 7      — RAG query cache
#   elkos-rag-api        FastAPI      — hybrid search endpoint (built from ../rag-engine)
#
# "Claude is the LLM": embeddings are generated locally (BAAI/bge-small-en-v1.5
# via fastembed, ONNX/CPU) — no external inference API, no key, no quota.
#
# This base file declares NO host port exposure; the dev/prod overlays decide:
#   - compose.rag.dev.yaml  → bind ports to 127.0.0.1 (laptop)
#   - compose.rag.prod.yaml → internal-only (reachable on the elkos-rag network)
#
# Inclusion is controlled by ELK_OS_WITH_RAG (default: true). See bin/elk-os.
#
# Note on the RAG Postgres password: this isolated KB database reuses the
# elk-os-generated POSTGRES_PASSWORD secret. It is a separate container + volume
# from the Directus database, so sharing the random secret is safe and avoids
# forcing an .env regeneration on existing installs. Override with
# RAG_POSTGRES_* in .env if you want a fully distinct credential.

networks:
  elkos-rag:
    driver: bridge

volumes:
  elkos_rag_pgdata:
  elkos_qdrant_data:
  elkos_redis_data:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — knowledge-base documents + full-text search
  # ---------------------------------------------------------------------------
  elkos-rag-postgres:
    image: postgres:15-alpine
    container_name: elkos-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RAG_POSTGRES_DB:-analog_elk}
      POSTGRES_USER: ${RAG_POSTGRES_USER:-analog_elk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — run ./bin/elk-os init}
    volumes:
      - elkos_rag_pgdata:/var/lib/postgresql/data
    networks:
      - elkos-rag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAG_POSTGRES_USER:-analog_elk} -d ${RAG_POSTGRES_DB:-analog_elk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Qdrant — vector database (semantic search)
  # ---------------------------------------------------------------------------
  elkos-qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: elkos-qdrant
    restart: unless-stopped
    volumes:
      - elkos_qdrant_data:/qdrant/storage
    networks:
      - elkos-rag
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Redis 7 — RAG query cache
  # ---------------------------------------------------------------------------
  elkos-redis:
    image: redis:7-alpine
    container_name: elkos-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - elkos_redis_data:/data
    networks:
      - elkos-rag
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # RAG API — FastAPI hybrid search (built locally from ../rag-engine)
  # P7 may swap `build:` for a published `image:`; see rag-engine/PROVENANCE.md.
  # ---------------------------------------------------------------------------
  elkos-rag-api:
    build:
      context: ./rag-engine
      dockerfile: Dockerfile
    container_name: elkos-rag-api
    restart: unless-stopped
    environment:
      POSTGRES_HOST: elkos-rag-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${RAG_POSTGRES_DB:-analog_elk}
      POSTGRES_USER: ${RAG_POSTGRES_USER:-analog_elk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — run ./bin/elk-os init}
      REDIS_HOST: elkos-redis
      REDIS_PORT: "6379"
      QDRANT_HOST: elkos-qdrant
      QDRANT_PORT: "6333"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Empty = write endpoints (/ingest) are open on the internal network only.
      RAG_API_KEY: ${RAG_API_KEY:-}
    networks:
      - elkos-rag
    depends_on:
      elkos-rag-postgres:
        condition: service_healthy
      elkos-qdrant:
        condition: service_healthy
      elkos-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
