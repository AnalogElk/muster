# Elk OS — published-images overlay: PORTAL (half of the image-or-build toggle)
#
# Layer this overlay to PULL the portal image from a registry (GHCR) instead of
# building it locally. bin/elk-os appends it automatically when
# ELK_OS_USE_PUBLISHED_IMAGES=true in .env AND the portal overlay is enabled
# (ELK_OS_WITH_PORTAL=true).
#
# It is split from the RAG half (compose.images.rag.yaml) on purpose: each half
# must only be layered when its base overlay is in the file set. A single
# combined overlay declared BOTH services unconditionally, so disabling one
# subsystem (e.g. ELK_OS_WITH_RAG=false) still demanded its *_IMAGE var — or
# worse, created a stray container with no networks/env (P6 follow-up #3).
#
# `build: !reset null` drops the build section compose.portal.yaml declares
# (Docker Compose >= 2.24), so compose pulls PORTAL_IMAGE rather than building.
# Set it to a fully-qualified ref in .env, e.g.
#   PORTAL_IMAGE=ghcr.io/<owner>/elk-os-portal:0.1.0
# Images are published by .github/workflows/publish-images.yml on tag.

services:
  portal:
    build: !reset null
    image: ${PORTAL_IMAGE:?set PORTAL_IMAGE to a published portal image ref (ELK_OS_USE_PUBLISHED_IMAGES=true)}
