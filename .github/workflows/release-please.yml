# Automated semantic versioning for Elk OS.
#
# Elk OS is a bash + Docker Compose repo, NOT a Node package, so the Node release
# type does not fit. We use release-please with `release-type: simple`: the
# version of record lives in `version.txt` and the changelog in `CHANGELOG.md`.
#
# On every push to main, release-please reads the Conventional Commit history
# since the last release and maintains a single "release PR" that bumps
# version.txt + updates CHANGELOG.md. Merging that PR tags the commit
# (vX.Y.Z) and cuts the GitHub Release.
#
#   feat:  -> minor   fix:/perf: -> patch   feat!:/BREAKING CHANGE -> major
#
# version.txt is NEVER hand-edited; this workflow owns it.
# (DevProd CLAUDE.md §7: versioning is automated, all projects.)
#
# This activates once the repo has a GitHub remote. Until then it is inert.
#
# ENTERPRISE BLOCK + PAT FALLBACK (2026-07-01):
# The AnalogElk enterprise policy forces the Actions GITHUB_TOKEN read-only and
# blocks Actions from creating PRs ("Write permissions for workflows are
# disabled by the enterprise"; repo-level PUT on
# /actions/permissions/workflow returns 409). The `permissions:` block below is
# therefore ignored, and release-please cannot open its release PR with the
# default token. Fix: mint a PAT and add it as a repo secret:
#
#   Secret name: RELEASE_PLEASE_TOKEN
#   Token type:  FINE-GRAINED PAT (github.com -> Settings -> Developer settings
#                -> Personal access tokens -> Fine-grained tokens)
#   Resource:    AnalogElk/muster (this repo only)
#   Permissions: Contents: Read and write, Pull requests: Read and write
#
# RELEASE_PLEASE_TOKEN is configured and working (releases v0.1.1+ were cut by
# it); the PAT recipe above is kept as setup reference for forks/new repos.
# Without the secret the step falls back to github.token (read-only) and fails.
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # PAT fallback: enterprise policy keeps github.token read-only, so a
          # fine-grained PAT (RELEASE_PLEASE_TOKEN, see header) is required for
          # release-please to push the release branch + open the release PR.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
